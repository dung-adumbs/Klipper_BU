# ======================================================================
# CENTERING & Z-SAFETY
# ======================================================================

[gcode_macro _CENTERING_VARS]
variable_pin_top: 0
variable_safe_z: 0
gcode: # Internal use only

[gcode_macro LOCATE_NOZZLE]
description: Centering macro with Hard Z-Stop
gcode:
    {% set EST_X = 1.5 %}
    {% set EST_Y = 289.0 %}
    {% set SEARCH_DEPTH = 1.2 %}
    {% set CRASH_LIMIT = 2.0 %}
    {% set MARGIN = 4.0 %}
    
    G90
    G1 Z20 F1500                   
    G1 X{EST_X} Y{EST_Y} F6000     

    QUERY_PROBE
    _CHECK_PROBE_STATE
    
    RESPOND MSG="Probing pin top..."
    PROBE
    M400 
    
    {% set pt = printer.probe.last_z_result|float %}
    {% set sz = pt - SEARCH_DEPTH %}
    
    SET_GCODE_VARIABLE MACRO=_CENTERING_VARS VARIABLE=pin_top VALUE={pt}
    SET_GCODE_VARIABLE MACRO=_CENTERING_VARS VARIABLE=safe_z VALUE={sz}
    
    # HARDWARE FUSE
    {% if pt < 2.0 or (pt - sz) > CRASH_LIMIT %}
        { action_raise_error("Z-SAFETY TRIGGERED: Probe failed or depth > 2mm.") }
    {% endif %}
    
    RESPOND MSG="Pin Top: {pt} | Search Z: {sz}"
    G1 Z20 F1500

    # X SEARCH
    G1 X{EST_X - MARGIN} Y{EST_Y} F4000
    G1 Z{sz} F600
    M400
    _SIDE_STEP AXIS=X DIST={MARGIN} SPEED=200
    {% set x_min = printer.toolhead.position.x %}
    G1 Z20 F1500

    G1 X{EST_X + MARGIN} Y{EST_Y} F4000
    G1 Z{sz} F600
    M400
    _SIDE_STEP AXIS=X DIST=-{MARGIN} SPEED=200
    {% set x_max = printer.toolhead.position.x %}
    G1 Z20 F1500
    {% set mid_x = (x_min + x_max) / 2 %}

    # Y SEARCH
    G1 X{mid_x} Y{EST_Y - MARGIN} F4000
    G1 Z{sz} F600
    M400
    _SIDE_STEP AXIS=Y DIST={MARGIN} SPEED=200
    {% set y_min = printer.toolhead.position.y %}
    G1 Z20 F1500

    G1 X{mid_x} Y{EST_Y + MARGIN} F4000
    G1 Z{sz} F600
    M400
    _SIDE_STEP AXIS=Y DIST=-{MARGIN} SPEED=200
    {% set y_max = printer.toolhead.position.y %}
    G1 Z20 F1500
    {% set mid_y = (y_min + y_max) / 2 %}

    G1 X{mid_x} Y{mid_y} F4000
    G1 Z20 F1500
    RESPOND MSG="Center Found: X{mid_x} Y{mid_y}"

[gcode_macro _SIDE_STEP]
gcode:
    {% set axis = params.AXIS %}
    {% set dist = params.DIST|float %}
    {% set step = 0.05 if dist > 0 else -0.05 %}
    {% set max_steps = (dist / step)|abs|int %}
    {% for i in range(max_steps) %}
        QUERY_PROBE
        _SIDE_STEP_LOGIC AXIS={axis} STEP={step}
    {% endfor %}

[gcode_macro _SIDE_STEP_LOGIC]
gcode:
    {% if not printer.probe.last_query %}
        G91
        G1 {params.AXIS}{params.STEP} F200
        G90
    {% endif %}

[gcode_macro _CHECK_PROBE_STATE]
gcode:
    {% if printer.probe.last_query %}
        { action_raise_error("PROBE ERROR: Already triggered. Clean nozzle.") }
    {% endif %}

# ======================================================================
# SYSTEM MACROS
# ======================================================================

[gcode_macro PAUSE]
rename_existing: PAUSE_BASE
gcode:
    PAUSE_BASE
    G91
    G1 Z10 F900
    G90
    G1 X10 Y300 F6000

[gcode_macro RESUME]
rename_existing: RESUME_BASE
gcode:
    RESUME_BASE

[gcode_macro CANCEL_PRINT]
rename_existing: CANCEL_PRINT_BASE
gcode:
    TURN_OFF_HEATERS
    CANCEL_PRINT_BASE
    END_PRINT

[gcode_macro WIPE_NOZZLE]
gcode:
    G90
    G1 X343 Y10 Z15 F6000
    G1 Z6.5 F3000
    {% for i in range(3) %}
        G1 Y90 F6000
        G1 Y10 F6000
    {% endfor %}
    G1 Z20 F3000