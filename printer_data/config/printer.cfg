[mcu]
serial: /dev/serial/by-id/usb-Klipper_stm32g0b1xx_45001A000F50415833323520-if00

[mcu EBBCan]
canbus_uuid: b33aeef36a93

[printer]
kinematics: corexy
max_velocity: 300
max_accel: 3000
max_z_velocity: 15
max_z_accel: 100

[homing_override]
axes: xyz
set_position_z: 0
gcode:
    G91
    G1 Z20 F2200           
    G90
    SET_TMC_CURRENT STEPPER=stepper_x CURRENT=0.7
    SET_TMC_CURRENT STEPPER=stepper_y CURRENT=0.7
    G28 X                 
    G91
    G1 X10 F3000          
    G90
    M400                  
    G28 Y
    G4 P1000
    G28 Z
    SET_TMC_CURRENT STEPPER=stepper_x CURRENT=1.1
    SET_TMC_CURRENT STEPPER=stepper_y CURRENT=1.1
    SAFE_SEEK_3AXIS       

[gcode_macro SAFE_SEEK_3AXIS]
gcode:
    G90
    G1 Z15 F1200             
    G1 X-28.5 Y310 F12000    
    G1 Z5.0 F1200            
    M400
    RESPOND MSG="Y-Axis: Sniffing toward pin from Y310..."
    _SNIFF_AXIS AXIS=Y DIRECTION=-1 MAX_STEPS=25
    G1 Z15 F1200             
    G1 Y{printer.toolhead.position.y + 3} F3000 
    G1 Z9.5 F1200            
    RESPOND MSG="Probing Z Axis..."
    PROBE SPEED=2 SAMPLES=1
    _FINISH_3AXIS_X_CHECK

[gcode_macro _FINISH_3AXIS_X_CHECK]
gcode:
    {% set actual_z = printer.probe.last_z_result %}
    {% if actual_z <= 5.05 %}
        { action_raise_error("Z-PROBE FAILURE: Nozzle missed pin top!") }
    {% else %}
        G1 Z15 F1200          
        G1 X-45 F12000        
        G1 Z5.0 F1200         
        RESPOND MSG="Sniffing X Axis..."
        _SNIFF_AXIS AXIS=X DIRECTION=1 MAX_STEPS=25
        G1 Z15 F1200
        G1 X150 Y150 F12000   
        RESPOND MSG="3-Axis Verification Complete."
    {% endif %}

[gcode_macro _SNIFF_AXIS]
gcode:
    {% set axis = params.AXIS %}
    {% set dir = params.DIRECTION|float %}
    {% set steps = params.MAX_STEPS|int %}
    QUERY_PROBE
    M400 
    _SNIFF_ITERATE AXIS={axis} DIRECTION={dir} STEPS={steps}

[gcode_macro _SNIFF_ITERATE]
gcode:
    {% set axis = params.AXIS %}
    {% set dir = params.DIRECTION|float %}
    {% set steps = params.STEPS|int %}
    {% if not printer.probe.last_query %}
        {% if steps > 0 %}
            G91
            G1 {axis}{dir} F1200  
            G90
            M400
            QUERY_PROBE
            _SNIFF_ITERATE AXIS={axis} DIRECTION={dir} STEPS={steps - 1}
        {% else %}
            { action_raise_error("SNIFF FAILURE: Pin not found on " ~ axis) }
        {% endif %}
    {% else %}
        G91
        G1 {axis}{-3.0 * dir} F2400
        G90
        M400
    {% endif %}

[probe]
pin: ^EBBCan:PB8
x_offset: 0
y_offset: 0
z_offset: 0     
speed: 5
samples: 1

[extruder]
step_pin: EBBCan: PD0
dir_pin: !EBBCan: PD1
enable_pin: !EBBCan: PD2
microsteps: 16
rotation_distance: 33.500
nozzle_diameter: 0.400
heater_pin: EBBCan: PB13
sensor_type: Generic 3950
sensor_pin: EBBCan: PA4  # Verified alternative pin
control: pid
pid_Kp: 21.527
pid_Ki: 1.063
pid_Kd: 108.982
min_temp: 0
max_temp: 280

[heater_bed]
heater_pin: PA1
sensor_pin: PC4 
sensor_type: Generic 3950
control: watermark
min_temp: 0
max_temp: 120

[stepper_x]
step_pin: PE3
dir_pin: PE2
enable_pin: !PE4
microsteps: 16
rotation_distance: 40
endstop_pin: tmc2209_stepper_x:virtual_endstop
position_endstop: 0
position_max: 300
homing_speed: 40

[tmc2209 stepper_x]
uart_pin: PD5
diag_pin: PA15
run_current: 1.1
driver_SGTHRS: 100      

[stepper_y]
step_pin: PE0
dir_pin: PB9
enable_pin: !PE1
microsteps: 16
rotation_distance: 40
endstop_pin: tmc2209_stepper_y:virtual_endstop
position_endstop: 310
position_max: 310
homing_speed: 40

[tmc2209 stepper_y]
uart_pin: PD7
diag_pin: PA14
run_current: 1.1
driver_SGTHRS: 100

[stepper_z]
step_pin: PB5
dir_pin: PB4
enable_pin: !PB8      
microsteps: 16
rotation_distance: 8
endstop_pin: PC2        
position_endstop: 0
position_max: 400
position_min: -5        

[tmc2209 stepper_z]
uart_pin: PD4
run_current: 0.8

[respond]