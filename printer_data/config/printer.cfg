#####################################################################
# Includes & External Configs
#####################################################################
[include mainsail.cfg]
[include macros.cfg]
[include slot.cfg]
[include common.cfg]
[include TEST_Speed.cfg]
[include EBBcan.cfg]
[include shell_command.cfg]
[include ktc/base/*.cfg]
[include ktc/optional_rrf_compability/*.cfg]

#####################################################################
# MCU & Printer Base Settings
#####################################################################
[mcu]
serial: /dev/serial/by-id/usb-Klipper_stm32g0b1xx_45001A000F50415833323520-if00
restart_method: command

[printer]
kinematics: corexy
max_velocity: 500
max_accel: 7000
square_corner_velocity: 5.0
max_z_velocity: 75
max_z_accel: 200

#####################################################################
# KTC (Klipper Tool Changer) Setup
#####################################################################
[ktc]
log_level: 2

[ktc_toolchanger]
# Required parent section for KTC tools

[ktc_tool 0]
tool_number: 0
toolchanger: ktc_toolchanger
heater: extruder
fans: partfan_t0
params_park: 198, 50, 0
params_offsets: 0.0, 0.0, 0.0

#####################################################################
# Stepper Configuration
#####################################################################
[stepper_x]
step_pin: PB13
dir_pin: !PB12
enable_pin: !PB14
microsteps: 16
rotation_distance: 40
homing_retract_dist: 0
endstop_pin: tmc2209_stepper_x:virtual_endstop
position_endstop: -33
position_min: -33
position_max: 388
homing_speed: 40

[tmc2209 stepper_x]
uart_pin: PC11
tx_pin: PC10
uart_address: 0
run_current: 1.1
stealthchop_threshold: 999999
sense_resistor: 0.110
diag_pin: PC0
driver_SGTHRS: 100

[stepper_y]
step_pin: PB10
dir_pin: !PB2
enable_pin: !PB11
microsteps: 16
rotation_distance: 40
homing_retract_dist: 0
endstop_pin: tmc2209_stepper_y:virtual_endstop
position_endstop: 341
position_min: -43
position_max: 341
homing_speed: 30

[tmc2209 stepper_y]
uart_pin: PC11
tx_pin: PC10
uart_address: 2
run_current: 1.1
stealthchop_threshold: 999999
sense_resistor: 0.110
diag_pin: PC1
driver_SGTHRS: 80

[stepper_z]
step_pin: PB0
dir_pin: !PC5
enable_pin: !PB1
microsteps: 16
rotation_distance: 4
endstop_pin: ^!PC2
position_endstop: -0.225
position_