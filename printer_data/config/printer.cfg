

# This file contains a configuration for the X5SA printer.
#
# See docs/Config_Reference.md for a description of parameters.
#
# To build the firmware, use the following configuration:
#   - Micro-controller: Huada Semiconductor HC32F460
#   - Communication interface: Serial (PA15 & PA9)
#   - You need to set up correct offset for bootloader! It's not yet implemented in Klipper menuconfig configuration. Offset should be 0x010000
#
# Installation:
#  1. Rename the klipper bin to `firmware.bin` and copy it to an SD Card.
#  2. Power off the Printer, insert the SD Card and power it on.
#  3. The printer should beep several times before and after flashing


[include macros.cfg]
[include slot.cfg]
[include common.cfg]
[include TEST_Speed.cfg]
[include EBBcan.cfg]
[include mainsail.cfg]

[ktc_tool 0]
tool_number: 0
heater: extruder
fans: partfan_t0
params_park:198,50, 0


# Parking and Offsets
params_park_x: 198
params_park_y: 50
params_park_z: 0




#[include EBBcan2.cfg]

[mcu]
serial: /dev/serial/by-id/usb-Klipper_stm32g0b1xx_45001A000F50415833323520-if00
restart_method: command

#[mcu rpi]
#serial: /tmp/klipper_mcu

#[mcu EBB]
#canbus_uuid: b33aeef36a93

# embedded temperature sensor
[temperature_sensor EBBCan]
sensor_type: temperature_mcu
sensor_mcu: EBBCan
min_temp: 0
max_temp: 100

[printer]
kinematics: corexy
max_velocity: 500
max_accel: 7000
square_corner_velocity: 5.0  # Set the desired value here
max_z_velocity: 75#dung25
max_z_accel: 200

[input_shaper]
shaper_freq_x: 44
shaper_freq_y: 44
shaper_type: mzv


[filament_switch_sensor my_filament_sensor]
switch_pin: ^!PC13
#pin pullup: True   # Uncomment if your sensor requires a pull-up resistor
pause_on_runout: True
runout_gcode: PAUSE
insert_gcode: RESUME
#debounce_ms: 100

[stepper_x]
step_pin: PB13
dir_pin: !PB12
enable_pin: !PB14
microsteps: 16
rotation_distance: 40
homing_retract_dist: 0
endstop_pin: tmc2209_stepper_x:virtual_endstop
position_endstop: -33 #dung0
position_min: -33
position_max: 388
homing_speed: 40

[tmc2209 stepper_x]
uart_pin: PC11
tx_pin: PC10
uart_address: 0
run_current: 1.1#dung0.580
stealthchop_threshold: 999999
sense_resistor: 0.110
diag_pin: PC0   #!PA15             # X DIAG pin routed to X endstop
driver_SGTHRS: 100

[stepper_y]
step_pin: PB10
dir_pin: !PB2
enable_pin: !PB11
microsteps: 16
rotation_distance: 40
homing_retract_dist: 0
endstop_pin: tmc2209_stepper_y:virtual_endstop
position_endstop: 341#dung-29
position_min: -43
position_max: 341
homing_speed: 30

[tmc2209 stepper_y]
uart_pin: PC11
tx_pin: PC10
uart_address: 2
run_current: 1.1#dung 0.580
stealthchop_threshold: 999999
sense_resistor: 0.110
diag_pin: PC1  #!PC0               # Y DIAG pin routed to Y endstop
driver_SGTHRS: 80 # WAS 100

[stepper_z]
step_pin: PB0
dir_pin: !PC5
enable_pin: !PB1
microsteps: 16
rotation_distance: 4
endstop_pin: ^!PC2

#dung endstop_pin: probe:z_virtual_endstop  # Use the probe as the Z endstop
position_min: 0 # Allow Z to move below the bed level to account for negative offset
position_endstop: 0
position_max: 415

#[safe_z_home]
#home_xy_position: 150, 150  # Replace X and Y with your desired homing position
#speed: 150               # Speed for XY movement
#z_hop: 10               # Raise the Z axis by this amount before homing
#z_hop_speed: 150         # Speed for Z axis movement

[homing_override]
axes: xyz
set_position_z: 0
gcode:
  # 1. Safety Lift
  G91
  G1 Z20 F2200
  G90

 # --- X Homing Cycle ---
  SET_TMC_CURRENT STEPPER=stepper_x CURRENT=0.9
  SET_TMC_CURRENT STEPPER=stepper_y CURRENT=0.9
  G28 X                 # First Home
  G91
  G1 X10 F3000          # Back off further (10mm is safer for flag reset)
  G90
  M400                  # Finish moves
  G4 P500               # Pause between axes

  # --- Y Homing Cycle ---
  G28 Y
  G4 P1000

  #POSITION FOR Z HOME (Physical Switch)
  #M400
  #G1 X-32 Y220 F12000 
  #HOME Z
  G28 Z
  G1 Z8 F2200
  #Restore Current
  SET_TMC_CURRENT STEPPER=stepper_x CURRENT=1.1
  SET_TMC_CURRENT STEPPER=stepper_y CURRENT=1.1
  G1 Z9.5 F500
  G1 X-28.5 Y300 F8000
 

  SAFE_SEEK_PROBE       # Precision check with 5mm hard-stop


[gcode_macro SAFE_SEEK_PROBE]
gcode:
    # 1. Fast move to starting gap
    G90
    G1 Z9.5 F1200
    M400
    
    MESSAGE_ECHO TEXT="Seeking nozzle... Target Z7.5, Hard Stop Z5.0"

    # 2. G38.2 move: This will stop at Z5.0 OR when the probe hits.
    # It is a native command, so NO recursion errors.
    G38.2 Z5.0 F150
    
    # 3. Verification logic
    _CHECK_SEEK_RESULT

[gcode_macro _CHECK_SEEK_RESULT]
gcode:
    # Check if the probe is currently triggered
    QUERY_PROBE
    M400
    
    {% if printer.probe.last_query %}
        {% set hit_z = printer.toolhead.position.z %}
        MESSAGE_ECHO TEXT="PROBE SUCCESS: Contact at Z{ "%.3f"|format(hit_z) }"
        G1 Z15 F1200
    {% else %}
        # If we reached this point and the probe isn't triggered, 
        # it means the G38.2 hit the Z5.0 limit.
        { action_raise_error("PROBE FAILURE: Nozzle missed! Stopped at safety floor Z5.0") }
    {% endif %}



 

[probe]
pin: ^EBBCan:PB8
x_offset: 0   # Changed to 0
y_offset: 0   # Changed to 0
z_offset: 0   # Calibrate this later
speed: 5

[gcode_macro VERIFY_NUDGE_CALIBRATION]
gcode:
    MESSAGE_ECHO TEXT="Moving to nudge sensor location..."
    G90                     # Absolute positioning
    G1 Z10 F1200            # Ensure we are high enough to clear the pin
    G1 X-28.5 Y300 F12000   # MOVE TO PIN LOCATION
    M400                    # Wait for move to finish
    
    MESSAGE_ECHO TEXT="Starting manual seek verification..."
    G1 Z2 F1200             # Drop to start height (2mm above zero)
    
    # Manual Seek Loop: 0.1mm steps for 4mm total travel
    G91                     # Switch to relative for the steps
    {% for i in range(40) %}
        QUERY_PROBE
        M400
        {% if printer.probe.last_query == False %}
            G1 Z-0.1 F300   # Move down 0.1mm
            G4 P50          # Pause for CAN bus latency
        {% endif %}
    {% endfor %}
    G90                     # Back to absolute

    # Final result check
    QUERY_PROBE
    {% if printer.probe.last_query %}
        MESSAGE_ECHO TEXT="SUCCESS: Sensor hit!"
        G1 Z10 F1200
        G1 X150 Y150 F12000
    {% else %}
        { action_raise_error("FAIL: Reached seek limit without trigger. XY alignment likely shifted!") }
    {% endif %}



    # Final result check
    QUERY_PROBE
    {% if printer.probe.last_query %}
        MESSAGE_ECHO TEXT="SUCCESS: Sensor hit!"
        G1 Z10 F1200
        G1 X150 Y150 F12000
    {% else %}
        { action_raise_error("FAIL: Reached seek limit without trigger. XY alignment likely shifted!") }
    {% endif %}
  
[gcode_macro VERIFY_BED_LOCATION]
gcode:
  # We use PROBE_REVERSE to check if the bed is actually there
  # 'query_probe' or a simple 'PROBE' command can work.
  # Here we use PROBE with a safety catch.
  
  {% set PROBE_Z_LIMIT = -12.0 %} # Your Z limit constraint
  
  MESSAGE_ECHO TEXT="Verifying bed position..."
  
  # Attempt to probe. If it doesn't trigger by -12mm, it throws an error.
  # Use 'SAMPLED_PROBE' or standard 'PROBE'
  PROBE SAMPLES=1 SAMPLE_RETRACT_DIST=3.0
  
  # Logic check: If the probe didn't trigger where expected
  # Klipper will naturally stop if it hits position_min.
  # To force a retry on failure, we check the last probe result:
  {% if printer.probe.last_z_result > 5.0 %} # Adjust '5.0' based on expected Z
    MESSAGE_ECHO TEXT="Bed not found! Retrying home..."
    G28 # This triggers the homing_override again
  {% else %}
    MESSAGE_ECHO TEXT="Bed verified. Moving to safe park."
    G1 Z30 F2000
    G1 X150 Y150 F20000
  {% endif %}

[gcode_macro MESSAGE_ECHO]
gcode:
  {% set text = params.TEXT|default("") %}
  { action_respond_info(text) }
    


[bed_mesh]
speed = 170
horizontal_move_z = 5
mesh_min = 30, 30
mesh_max = 300, 300
probe_count = 5, 5
algorithm = bicubic
fade_start = 1
fade_end = 10
fade_target = 0

[bed_screws]
screw1 = 5,5
screw2 = 165,5
screw3 = 325,5
screw4 = 5,325
screw5 = 165,325
screw6 = 325,325

[screws_tilt_adjust]
screw1 = 60, 30
screw1_name = front left screw
screw2 = 203, 30
screw2_name = front middle screw
screw3 = 335, 30
screw3_name = front right screw
screw4 = 60, 315
screw4_name = rear left screw
screw5 = 203, 315
screw5_name = rear middle screw
screw6 = 335, 315
screw6_name = rear right screw
horizontal_move_z = 20.
speed = 150.
screw_thread = CW-M3


[extruder]
step_pin: PB3
dir_pin: PB4
enable_pin: !PD1
#step_pin: PA15
#dir_pin: !PB3
#enable_pin: !PA14
microsteps: 16
rotation_distance: 4.637
nozzle_diameter: 0.400
filament_diameter: 1.750
max_extrude_cross_section: 1

heater_pin: PC8
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PA0
control: pid
pid_Kp: 22.2
pid_Ki: 1.08
pid_Kd: 114
min_temp: 0
max_temp: 280

[heater_bed]
heater_pin: PC9
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PC4
control: pid
pid_Kp: 54.027
pid_Ki: 0.770
pid_Kd: 948.182
min_temp: 0
max_temp: 130

[heater_fan heatbreak_cooling_fan]
pin: PC7

[heater_fan controller_fan]
pin: PB15

[fan_generic partfan_t0]
pin: PC6


[servo my_servo]
pin: PA8
maximum_servo_angle: 180
minimum_pulse_width: 0.0005
maximum_pulse_width: 0.0025

[servo ebb_servo]
pin: EBBCan:PB6
maximum_servo_angle: 180
minimum_pulse_width: 0.0005
maximum_pulse_width: 0.0025
initial_angle: 0

#[output_pin test_pwm]
#pin: EBBCan:PA4
#pwm: True
#cycle_time: 0.02  # 50Hz (20ms period)


