#####################################################################
# Includes & MCU
#####################################################################
[include mainsail.cfg]
[include macros.cfg]
[include slot.cfg]
[include common.cfg]
[include TEST_Speed.cfg]
[include EBBcan.cfg]
[include shell_command.cfg]
[include ktc/base/*.cfg]
[include ktc/optional_rrf_compability/*.cfg]

[save_variables]
filename: ~/printer_data/config/variables.cfg

[mcu]
serial: /dev/serial/by-id/usb-Klipper_stm32g0b1xx_45001A000F50415833323520-if00

[printer]
kinematics: corexy
max_velocity: 500
max_accel: 7000
square_corner_velocity: 5.0
max_z_velocity: 75
max_z_accel: 200

#####################################################################
# KTC Tool Configuration
#####################################################################
[ktc]

[ktc_toolchanger main_changer]

[ktc_tool 0]
tool_number: 0
toolchanger: main_changer
heater: extruder
fans: partfan_t0
params_park: 198, 50, 0
params_offsets: 0.0, 0.0, 0.0

#####################################################################
# KTC NATIVE CALIBRATION MODULE
#####################################################################
[tools_calibrate]
pin: ^EBBCan:PB8       # Nudge Sensor Pin
pin_x: -28.5           # Pin Location X
pin_y: 300.0           # Pin Location Y
pin_z: 7.34            # Pin Top Z
spread: 4.0            # Distance for lateral nudges
speed: 5               # Probe speed (mm/s)
travel_speed: 100      # Speed between probe points (mm/s)
lift_speed: 15         # Z lift speed
final_lift_z: 5.0      # Lift height when done
samples: 5             # Number of attempts per axis
samples_result: average # Store the mean of the 5 tries

#####################################################################
# Stepper Configuration
#####################################################################
[stepper_x]
step_pin: PB13
dir_pin: !PB12
enable_pin: !PB14
microsteps: 16
rotation_distance: 40
endstop_pin: tmc2209_stepper_x:virtual_endstop
position_endstop: -33
position_min: -33
position_max: 388
homing_speed: 40

[tmc2209 stepper_x]
uart_pin: PC11
tx_pin: PC10
uart_address: 0
run_current: 1.1
diag_pin: PC0
driver_SGTHRS: 100

[stepper_y]
step_pin: PB10
dir_pin: !PB2
enable_pin: !PB11
microsteps: 16
rotation_distance: 40
endstop_pin: tmc2209_stepper_y:virtual_endstop
position_endstop: 341
position_min: -43
position_max: 341
homing_speed: 30

[tmc2209 stepper_y]
uart_pin: PC11
tx_pin: PC10
uart_address: 2
run_current: 1.1
diag_pin: PC1
driver_SGTHRS: 80

[stepper_z]
step_pin: PB0
dir_pin: !PC5
enable_pin: !PB1
microsteps: 16
rotation_distance: 4
endstop_pin: ^!PC2
position_endstop: -0.225
position_min: -2.0
position_max: 415

#####################################################################
# Tool Hardware (EBB CAN)
#####################################################################
[extruder]
step_pin: PB3
dir_pin: PB4
enable_pin: !PD1
microsteps: 16
rotation_distance: 4.637
heater_pin: PC8
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PA0
control: pid
pid_Kp: 26.833
pid_Ki: 1.844
pid_Kd: 97.604
min_temp: 0
max_temp: 280

[probe]
pin: ^EBBCan:PB8
z_offset: 2.405
speed: 5

[fan_generic partfan_t0]
pin: PC6

[heater_bed]
heater_pin: PC9
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PC4
control: pid
pid_Kp: 54.027
pid_Ki: 0.770
pid_Kd: 948.182
min_temp: 0
max_temp: 130

#####################################################################
# Homing Override
#####################################################################
[homing_override]
axes: xyz
set_position_z: 0
gcode:
    G91
    G1 Z10 F2200
    G90
    G28 X
    G28 Y
    G28 Z
    SAFE_SEEK_PROBE

[gcode_macro SAFE_SEEK_PROBE]
gcode:
    G90
    G1 Z15 F1200
    G1 X-28.5 Y300 F12000
    M400
    QUERY_PROBE
    _DO_SAFE_PROBE

[gcode_macro _DO_SAFE_PROBE]
gcode:
    {% if printer.probe.last_query %}
        { action_raise_error("PROBE ERROR: Sensor triggered!") }
    {% else %}
        G1 Z9.5 F1200
        PROBE SPEED=2 SAMPLES=1
        G1 Z15 F1200
    {% endif %}