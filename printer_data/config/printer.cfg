#####################################################################
# Includes & External Configs
#####################################################################
[include mainsail.cfg]
[include macros.cfg]
[include slot.cfg]
[include common.cfg]
[include TEST_Speed.cfg]
[include EBBcan.cfg]
[include shell_command.cfg]
[include ktc/base/*.cfg]
[include ktc/optional_rrf_compability/*.cfg]

[save_variables]
filename: ~/printer_data/config/variables.cfg

#####################################################################
# MCU & Printer Base Settings
#####################################################################
[mcu]
serial: /dev/serial/by-id/usb-Klipper_stm32g0b1xx_45001A000F50415833323520-if00
restart_method: command

[printer]
kinematics: corexy
max_velocity: 500
max_accel: 7000
square_corner_velocity: 5.0
max_z_velocity: 75
max_z_accel: 200

#####################################################################
# KTC (Klipper Tool Changer) Setup
#####################################################################
[ktc]

[ktc_toolchanger main_changer]

[ktc_tool 0]
tool_number: 0
toolchanger: main_changer
heater: extruder
fans: partfan_t0
params_park: 198, 50, 0
params_offsets: 0.0, 0.0, 0.0

#####################################################################
# Stepper Configuration
#####################################################################
[stepper_x]
step_pin: PB13
dir_pin: !PB12
enable_pin: !PB14
microsteps: 16
rotation_distance: 40
homing_retract_dist: 0
endstop_pin: tmc2209_stepper_x:virtual_endstop
position_endstop: -33
position_min: -33
position_max: 388
homing_speed: 40

[tmc2209 stepper_x]
uart_pin: PC11
tx_pin: PC10
uart_address: 0
run_current: 1.1
stealthchop_threshold: 999999
sense_resistor: 0.110
diag_pin: PC0
driver_SGTHRS: 100

[stepper_y]
step_pin: PB10
dir_pin: !PB2
enable_pin: !PB11
microsteps: 16
rotation_distance: 40
homing_retract_dist: 0
endstop_pin: tmc2209_stepper_y:virtual_endstop
position_endstop: 341
position_min: -43
position_max: 341
homing_speed: 30

[tmc2209 stepper_y]
uart_pin: PC11
tx_pin: PC10
uart_address: 2
run_current: 1.1
stealthchop_threshold: 999999
sense_resistor: 0.110
diag_pin: PC1
driver_SGTHRS: 80

[stepper_z]
step_pin: PB0
dir_pin: !PC5
enable_pin: !PB1
microsteps: 16
rotation_distance: 4
endstop_pin: ^!PC2
position_endstop: -0.225
position_min: -2.0
position_max: 415

#####################################################################
# Tool & Heater Configuration
#####################################################################
[extruder]
step_pin: PB3
dir_pin: PB4
enable_pin: !PD1
microsteps: 16
rotation_distance: 4.637
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: PC8
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PA0
control: pid
pid_Kp: 26.833
pid_Ki: 1.844
pid_Kd: 97.604
min_temp: 0
max_temp: 280

[heater_bed]
heater_pin: PC9
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PC4
control: pid
pid_Kp: 54.027
pid_Ki: 0.770
pid_Kd: 948.182
min_temp: 0
max_temp: 130

#####################################################################
# Probe & Fans
#####################################################################
[probe]
pin: ^EBBCan:PB8
z_offset: 2.405
speed: 5

[fan_generic partfan_t0]
pin: PC6

#####################################################################
# Nozzle Locating & Calibration Blocks
#####################################################################

[gcode_macro _CENTERING_VARS]
variable_pin_top: 0
variable_safe_z: 0
variable_center_x: 0
variable_center_y: 0
gcode:

[gcode_macro LOCATE_NOZZLE]
description: Find Z-top and auto-center XY based on Homing Coordinates
gcode:
    # Synchronized with SAFE_SEEK_PROBE
    {% set EST_X = -28.5 %}
    {% set EST_Y = 300.0 %}
    {% set SEARCH_DEPTH = 1.0 %} # Reduced from 1.5 to 1.0 for shallower nudges
    {% set TRAVEL_SPEED = 6000 %}
    {% set OFFSET = 4.5 %} # Increased slightly to prevent pre-triggering on approach

    G90
    G1 Z20 F1500 # Starting higher for safety
    G1 X{EST_X} Y{EST_Y} F{TRAVEL_SPEED}

    # --- Find Z Reference ---
    RESPOND MSG="Probing pin top..."
    PROBE
    G4 P200 
    {% set pt = printer.probe.last_z_result|float %}
    {% set sz = pt - SEARCH_DEPTH %}
    SET_GCODE_VARIABLE MACRO=_CENTERING_VARS VARIABLE=pin_top VALUE={pt}
    SET_GCODE_VARIABLE MACRO=_CENTERING_VARS VARIABLE=safe_z VALUE={sz}
    
    # Back off Z before moving to sides to clear the trigger
    G1 Z{pt + 5} F1500

    # --- Probe X ---
    G1 X{EST_X + OFFSET} Y{EST_Y} F{TRAVEL_SPEED}
    G1 Z{sz} F1500
    PROBE SPEED=5
    {% set x1 = printer.gcode_move.gcode_position.x|float %}
    
    G1 Z{pt + 5} F1500
    G1 X{EST_X - OFFSET} Y{EST_Y} F{TRAVEL_SPEED}
    G1 Z{sz} F1500
    PROBE SPEED=5
    {% set x2 = printer.gcode_move.gcode_position.x|float %}

    # --- Probe Y ---
    G1 Z{pt + 5} F1500
    G1 X{EST_X} Y{EST_Y + OFFSET} F{TRAVEL_SPEED}
    G1 Z{sz} F1500
    PROBE SPEED=5
    {% set y1 = printer.gcode_move.gcode_position.y|float %}

    G1 Z{pt + 5} F1500
    G1 X{EST_X} Y{EST_Y - OFFSET} F{TRAVEL_SPEED}
    G1 Z{sz} F1500
    PROBE SPEED=5
    {% set y2 = printer.gcode_move.gcode_position.y|float %}

    # --- Calculate and Save ---
    {% set mid_x = (x1 + x2) / 2 %}
    {% set mid_y = (y1 + y2) / 2 %}
    
    SET_GCODE_VARIABLE MACRO=_CENTERING_VARS VARIABLE=center_x VALUE={mid_x}
    SET_GCODE_VARIABLE MACRO=_CENTERING_VARS VARIABLE=center_y VALUE={mid_y}
    SAVE_VARIABLE VARIABLE=t0_z_ref VALUE={pt}
    SAVE_VARIABLE VARIABLE=t0_center_x VALUE={mid_x}
    SAVE_VARIABLE VARIABLE=t0_center_y VALUE={mid_y}

    G1 Z25 F1500
    G1 X{mid_x} Y{mid_y} F{TRAVEL_SPEED}
    RESPOND MSG="CALIBRATION COMPLETE: X={mid_x} Y={mid_y} Z={pt}"

#####################################################################
# Homing & Safety Macros
#####################################################################

[homing_override]
axes: xyz
set_position_z: 0
gcode:
    G91
    G1 Z10 F2200
    G90
    SET_TMC_CURRENT STEPPER=stepper_x CURRENT=0.9
    SET_TMC_CURRENT STEPPER=stepper_y CURRENT=0.9
    G28 X
    G91
    G1 X10 F3000
    G90
    M400
    G28 Y
    G4 P500
    G28 Z
    SET_TMC_CURRENT STEPPER=stepper_x CURRENT=1.1
    SET_TMC_CURRENT STEPPER=stepper_y CURRENT=1.1
    SAFE_SEEK_PROBE

[gcode_macro SAFE_SEEK_PROBE]
gcode:
    G90
    G1 Z15 F1200
    G1 X-28.5 Y300 F12000
    M400
    QUERY_PROBE
    _DO_SAFE_PROBE

[gcode_macro _DO_SAFE_PROBE]
gcode:
    {% if printer.probe.last_query %}
        { action_raise_error("PROBE ERROR: Sensor triggered!") }
    {% else %}
        G1 Z9.5 F1200
        PROBE SPEED=2 SAMPLES=1
        G1 Z15 F1200
    {% endif %}